sensitive_patterns:
- pattern: (?i)password
  severity: 0.6
  type: sensitive
- pattern: (?i)secret
  severity: 0.6
  type: sensitive
- pattern: (?i)api[_-]?key
  severity: 0.6
  type: sensitive
- pattern: (?i)token
  severity: 0.6
  type: sensitive
- pattern: (?i)ssh-rsa
  severity: 0.6
  type: sensitive
- pattern: (?i)credit card
  severity: 0.6
  type: sensitive
- pattern: (?i)social security
  severity: 0.6
  type: sensitive
- pattern: (?i)extract API keys
  severity: 0.7
  type: sensitive
- pattern: (?i)export customer data
  severity: 0.7
