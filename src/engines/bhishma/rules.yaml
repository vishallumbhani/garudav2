critical_patterns:
- pattern: (?i)(ignore|disregard|forget) previous instructions
  severity: 0.95
  type: critical
- pattern: (?i)reveal (system|base) prompt
  severity: 0.95
  type: critical
- pattern: (?i)-----BEGIN (RSA|OPENSSH|DSA|EC) PRIVATE KEY-----
  severity: 0.95
  type: critical
- pattern: (?i)Bearer [A-Za-z0-9_\-\.]{20,}
  severity: 0.95
  type: critical
- pattern: sk-[A-Za-z0-9]{32,}
  severity: 0.95
  type: critical
- pattern: '(?i)(api[_-]?key|token)[=: ]+[A-Za-z0-9]{10,}'
  severity: 0.95
  type: critical
- pattern: (?i)pretend (you are|to be|you're)
  severity: 0.8
  type: critical
- pattern: (?i)act as (if|though|a)
